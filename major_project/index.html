<!DOCTYPE html>
<html>

<head>

    <!-- meta tags and title -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astronomy Calendar</title>

    <!-- external and internal CSS -->
    <link rel="stylesheet" href="styles.css" media="all">
    <style>
        /* in-file CSS here */
    </style>

    <!-- external and internal JavaScript -->
    <script src="scripts.js" type="module" defer></script>
    <script>
        // in-page JavaScript here
    </script>

</head>

<body>

    <nav>
        <form id="citySearch">
            <input type="text" name="searchbar" placeholder="[insert current city here]">
            <button type=submit>&#128269;</button>
        </form>
        <button class="dropdown">
            Filter
        </button>
    </nav>

    <main>
        <div id="dayNavigator">
            <button class="daysPrev"> &#8592; </button>
            <div id="dayIdentifier" style="grid-template-columns: calc(100% / 3) calc(100% / 3) calc(100% / 3)">
                    <div class="dayInfo">
                        <img class="moonPhase" src="https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg">
                        <div style="align-content: center;">
                            <span class="day">[day]</span>
                            <div class="timeframe"> 
                                <span class="sunset">[sunset]</span> - <span class="sunrise"> [sunrise] </span>
                            </div>
                        </div>
                    </div>
            </div>
            <button class="daysNext"> &#8594; </button>
        </div>
        
        </div>
        
        <div class="timeline-holder">
            <div class="sectionType" id="planets">
                <h2> Planets </h2>

                <!-- Timeline tempalte object-->
                <div class="timeline">
                    <div class="objectLabel">
                        [Planet Name]
                    </div>
                    <div class="line">
                        <div class="left-cap"></div>
                        <div class="right-cap"></div>
                    </div>
                </div>

            </div>
                
            <div class="sectionType" id="constelations">
                <h2> Constelations </h2>
                <!-- Timeline tempalte object-->
                <div class="timeline">
                    <div class="objectLabel">
                        [Constelation Name]
                    </div>
                    <div class="line">
                        <div class="left-cap"></div>
                        <div class="right-cap"></div>
                    </div>
                </div>

            </div>
        </ol>
    </main>
</body>

</html>
