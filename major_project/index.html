<!DOCTYPE html>
<html>

<head>

    <!-- meta tags and title -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astronomy Calendar</title>

    <!-- external and internal CSS -->
    <link rel="stylesheet" href="styles.css" media="all">
    <style>
        /* in-file CSS here */
    </style>

    <!-- external and internal JavaScript -->
    <script src="scripts.js" defer></script>
    <script>
        // in-page JavaScript here
    </script>

</head>

<body>

    <nav>
        <fourm>
            <input type="text" name="searchbar" placeholder="[insert current city here]">
            <button type=submit>&#128269;</button>
        </fourm>
        <button class="dropdown">
            Filter
        </button>
    </nav>

    <main>
        <div id="dayIdentifier">
            <button class="daysPrev"> &#8592; </button>
            <div class="dayIdentifier" style="grid-template-columns: calc(100% / 3) calc(100% / 3) calc(100% / 3)">
                    <li class="dayInfo">
                        <img class="moonPhase" src="https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg">
                        <div style="align-content: center;">
                            <span class="dayOfWeek">Today</span>
                            <div class="timeframe"> 
                                <span class="sunset">[sunset]</span> - <span class="sunrise"> [sunrise] </span>
                            </div>
                        </div>
                    </li>
                    <li class="dayInfo">
                        <img class="moonPhase" src="https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg">
                        <div style="align-content: center;">
                            <span class="dayOfWeek"> Tomorrow </span>
                            <div class="timeframe"> 
                                <span class="sunset">[sunset]</span> - <span class="sunrise"> [sunrise] </span>
                            </div>
                        </div>
                    </li>
                    <li class="dayInfo">
                        <img class="moonPhase" src="https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg">
                        <div style="align-content: center;">
                            <span class="dayOfWeek"> Wednesday </span>
                            <div class="timeframe"> 
                                <span class="sunset">[sunset]</span> - <span class="sunrise"> [sunrise] </span>
                            </div>
                        </div>
                    </li>
            </div>
            <button class="daysNext"> &#8594; </button>
        </div>
        
        <div class="timeline-holder">
            <div class="section-type planets">
                <h2> Planets </h2>
                <div class="timeline" style="left:10%; width: 50%;">
                    Jupiter
                    <div class="line" >
                        <div class="left-cap"></div>
                        <div class="right-cap"></div>
                    </div>
                </div>

                <div class="timeline">
                    <div>
                        Uranus
                    </div>
                    <div class="line" style="left:-10%; width: 100%;">
                        <div class="left-cap"></div>
                        <div class="right-cap"></div>
                    </div>
                </div>

            <div class="sectionType constelations">
                <h2> Constelations </h2>
                <div class="timeline" style="left:5%; width: 92%;">
                    Big Dipper
                    <div class="line" >
                        <div class="left-cap"></div>
                        <div class="right-cap"></div>
                    </div>
                </div>
            </div>
        </ol>
    </main>
</body>

</html>
