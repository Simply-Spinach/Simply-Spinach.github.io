<!DOCTYPE html>
<html>
<head>
	
	<!-- meta tags and title -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Weather: Klamath Falls </title>

	<!-- external and internal CSS -->
	<link rel="stylesheet" href="styles.css" media="all">
	<style>
		/* in-file CSS here */
	</style>

	<!-- external and internal JavaScript -->
	<script src="scripts.js" defer></script>
	<script>
		// in-page JavaScript here
	</script>

</head>

<body>
    <nav>
        <form action='' method="get">
            <input type="text" name="searchbar" placeholder="search for a city...">
            <button type="submit">Search</button>
        </form>
    </nav>

    <main>
        <h1>
            <span id="region"></span>
        </h1>
        <div>
            <img id='condition_img'>
        </div>
        <ol class="day_tabs">
            <li><button class="day_selected"> Today </button></li>
            <li><button>Tomorrow</button></li>
            <li><button>2 days from now</button></li>
        </ol>
        <div id="weatherInfo">
            <div>
                <strong id="condition"> </strong> <br>
                <span id="temp"> </span>&#176; <!-- Degree unicode --> <span id="temp_unit">F</span> <br>
                <strong> High: </strong> <span id="temp_high"> </span>&#176; <!-- Degree unicode --> <span id="temp_unit">F</span> <br>
                <strong> Low: </strong><span id="temp_low"> </span>&#176; <!-- Degree unicode --> <span id="temp_unit">F</span> <br>
            </div>
            <!-- compass -->
            <div id="wind">
                <div id="wind_compass">
                    <div class="arrow" id="wind_direction"> 
                        
                    </div>
                </div>
                <strong>Wind:</strong> <span id="wind_speed">1</span> <span id="speed_unit">mph</span> <br>
            </div>
            <div>
                <div>
                    <strong>Humidity:</strong> <span id="humidity"></span>&#37; <!-- Percent unicode-->
                </div>
            </div>
    </main>
    <div class="search_blur">
    </div>
</body>
</html>
